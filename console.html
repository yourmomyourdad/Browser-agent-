<!DOCTYPE html>
<html>
<head>
    <script src="/socket.io/socket.io.js"></script>
    <title>SIGNAL_OS Browser Agent</title>

    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            margin: 0;
            padding: 10px;
        }

        #output {
            white-space: pre-wrap;
            height: 90vh;
            overflow-y: auto;
        }

        #cmd {
            width: 100%;
            background: black;
            color: lime;
            border: none;
            outline: none;
            font-family: monospace;
            font-size: 16px;
        }
        #screen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: fill; /* IMPORTANT: no letterboxing */
}
    </style>
</head>
<body>
<img
    id="screen"
    style="
        width: 100vw;
        height: auto;
        display: block;
    "
>
<div id="output">
SIGNAL_OS Browser Agent

Type "help" for commands.

</div>

<input id="cmd" autocomplete="off" autofocus>
    
<iframe
    id="browser"
    style="
        width:100%;
        height:600px;
        border:1px solid lime;
        background:white;
    ">
</iframe>
    
<script>
const screen = document.getElementById("screen");
const output = document.getElementById("output");
const cmd = document.getElementById("cmd");
const socket = io();
const ctx = new AudioContext();

/*
the jitterBug project is an adaptive jitter buffer designed in javascript and modeled after netEq it's split into 3 parts which I will be writing them in the order they're used 
1.packetHolder this is updated in realtime by the backend the only actual code it executes is replacing the time it was sent with the difference of the time it was sent and the time it actually arrived as the departureTime 
2.DelayManager this uses how long the average departureTime is for each packet and uses that to decide how long it needs to buffer for optimizing the audio stream 
3.dragSpeed this is a relatively simple part of the project it just sets each slice to last until the next slice is scheduled to activate */
const packetHolder = {};
let timeNow = 0;
let timePast = null;
let delay = 40;
let dragSpeed = 1;
let playhead = ctx.currentTime + 0.05;
socket.on("audio", (chunk) => {

timeNow = performance.now()
if(timePast !== null)chunk.delay = timeNow-timePast;
console.log(chunk.sound.numberOfChannels)
chunk.sound = pcm16ToFloat32(chunk.sound)
playChunk(chunk.sound);
console.log(chunk)

timePast = timeNow

});

function pcm16ToFloat32(buffer) {
    const input = new Int16Array(buffer);
    const output = new Float32Array(input.length);

    for (let i = 0; i < input.length; i++) {
        output[i] = input[i] / 32768;
    }

    return output;
}
function playChunk(float32) {
    if (playhead < ctx.currentTime) {
    playhead = ctx.currentTime + delay/1000; 
}
    const buffer = ctx.createBuffer(1, float32.length, ctx.sampleRate);
    buffer.getChannelData(0).set(float32);

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);

    const drift = playhead - ctx.currentTime;
    const err = drift - delay/1000;
    let k = 3
    let dragSpeed = 1 + err * k;

    source.playbackRate.value = dragSpeed;
    source.start(playhead);
    playhead += buffer.duration/dragSpeed;
    console.log(err)
}
    
screen.addEventListener("click", (e) => {
    const rect = screen.getBoundingClientRect();

    const x = Math.floor((e.clientX - rect.left) / rect.width * 1280);
    const y = Math.floor((e.clientY - rect.top) / rect.height * 720);

    socket.emit("click", { x, y });
});

socket.on("connect", () => {
    print("CONNECTED");
});

socket.on("frame", (data) => {
    screen.src = "data:image/jpeg;base64," + data;
});
function print(text) {
    output.textContent += text + "\n";
    output.scrollTop = output.scrollHeight;
}
document.addEventListener("keydown", (e) => {
    socket.emit("key", e.key);
});
</script>
</body>
</html>
