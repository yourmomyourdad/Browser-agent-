<!DOCTYPE html>
<html>
<head>
    <script src="/socket.io/socket.io.js"></script>
    <title>SIGNAL_OS Browser Agent</title>

    <style>
        body {
            background: black;
            color: lime;
            font-family: monospace;
            margin: 0;
            padding: 10px;
        }

        #output {
            white-space: pre-wrap;
            height: 90vh;
            overflow-y: auto;
        }

        #cmd {
            width: 100%;
            background: black;
            color: lime;
            border: none;
            outline: none;
            font-family: monospace;
            font-size: 16px;
        }
        #screen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: fill; /* IMPORTANT: no letterboxing */
}
    </style>
</head>
<body>
<img
    id="screen"
    style="
        width: 100vw;
        height: auto;
        display: block;
    "
>
<div id="output">
SIGNAL_OS Browser Agent

Type "help" for commands.

</div>

<input id="cmd" autocomplete="off" autofocus>
    
<iframe
    id="browser"
    style="
        width:100%;
        height:600px;
        border:1px solid lime;
        background:white;
    ">
</iframe>
    
<script>
const screen = document.getElementById("screen");
const output = document.getElementById("output");
const cmd = document.getElementById("cmd");
const socket = io();
const ctx = new AudioContext();
const queue = [];
let playing = false;

socket.on("audio", (chunk) => {
    queue.push(new Uint8Array(chunk));

    if (!playing) {
        playNext();
    }
});

function playNext() {
    if (queue.length === 0) {
        playing = false;
        return;
    }

    playing = true;

    const uint8 = queue.shift();

    const int16 = new Int16Array(
        uint8.buffer,
        uint8.byteOffset,
        uint8.byteLength / 2
    );

    if (int16.length === 0) {
        playNext();
        return;
    }

    const buffer = ctx.createBuffer(1, int16.length, 48000);
    const channel = buffer.getChannelData(0);

    for (let i = 0; i < int16.length; i++) {
        channel[i] = int16[i] / 32768;
    }

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);

    source.onended = playNext;
    source.start();
}
screen.addEventListener("click", (e) => {
    const rect = screen.getBoundingClientRect();

    const x = Math.floor((e.clientX - rect.left) / rect.width * 1280);
    const y = Math.floor((e.clientY - rect.top) / rect.height * 720);

    socket.emit("click", { x, y });
});

socket.on("connect", () => {
    print("CONNECTED");
});

socket.on("frame", (data) => {
    screen.src = "data:image/jpeg;base64," + data;
});
function print(text) {
    output.textContent += text + "\n";
    output.scrollTop = output.scrollHeight;
}
async function renderPage() {

    const response =
        await fetch("/html");

    const html =
        await response.text();

    document
        .getElementById("browser")
        .srcdoc = html;

}
document.addEventListener("keydown", (e) => {
    socket.emit("key", e.key);
});
cmd.addEventListener("keydown", async (e) => {

    if (e.key !== "Enter") return;

    const command = cmd.value.trim();

    print("> " + command);

    cmd.value = "";

    if (command === "help") {

        print("Commands:");
        print("open <url>");
        print("title");

    }

    else if (command.startsWith("open ")) {

        const url = command.substring(5);

        const response = await fetch(
            "/navigate?url=" +
            encodeURIComponent(url)
        );

        print(await response.text());

    }

    else if (command === "title") {

        const response =
            await fetch("/title");

        print(await response.text());

    }

    else if (command === "html") {

    const response = await fetch("/html");
        
    renderPage();

    print("completed")

}

    else {

        print("Unknown command");

    }

});

</script>

</body>
</html>
